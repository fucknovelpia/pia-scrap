name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure src/__init__.py exists
        run: |
          if (!(Test-Path "src/__init__.py")) { New-Item -Path "src/__init__.py" -ItemType File -Force }

      - name: Build EXE with PyInstaller
        run: pyinstaller pia-scrap.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PIA-Scrap-Windows
          path: dist/PIA-Scrap.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PIA-Scrap.exe
          generate_release_notes: true
